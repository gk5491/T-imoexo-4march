<!DOCTYPE html>
<html>
  <head>
    <title>CORS Test</title>
  </head>
  <body>
    <h1>CORS Test for send_email.php</h1>
    <button onclick="testCORS()">Test CORS Request</button>
    <div id="result"></div>

    <script>
      async function testCORS() {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "Testing...";

        try {
          const testData = {
            name: "CORS Test User",
            email: "test@example.com",
            phone: "1234567890",
            country: "Test Country",
            requirement: "This is a test to verify CORS is working correctly.",
            sourcePage: "/cors-test",
          };

          const response = await fetch(
            "https://www.t-imoexo.com/send_email.php",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(testData),
            }
          );

          const result = await response.json();
          resultDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
        } catch (error) {
          resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
        }
      }
    </script>
  </body>
</html>
