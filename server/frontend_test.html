<!DOCTYPE html>
<html>
  <head>
    <title>Frontend Endpoint Test</title>
  </head>
  <body>
    <h1>Frontend Endpoint Test</h1>
    <button onclick="testEndpoint()">Test Current Endpoint</button>
    <div id="result"></div>

    <script>
      async function testEndpoint() {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "Testing...";

        try {
          // This should match what's in your Contact.jsx file
          const response = await fetch(
            "https://www.t-imoexo.com/send_email.php",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                name: "Test User",
                email: "test@example.com",
                phone: "1234567890",
                country: "Test Country",
                requirement: "This is a test message",
                sourcePage: "/frontend-test",
              }),
            }
          );

          const result = await response.json();
          resultDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
        } catch (error) {
          resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
          console.error("Full error:", error);
        }
      }
    </script>
  </body>
</html>
