<!DOCTYPE html>
<html>
  <head>
    <title>CORS Test</title>
  </head>
  <body>
    <h1>CORS Configuration Test</h1>
    <button onclick="testCORS()">Test CORS Configuration</button>
    <div
      id="result"
      style="margin-top: 20px; padding: 10px; background: #f0f0f0"
    ></div>

    <script>
      async function testCORS() {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "Testing...";

        try {
          const response = await fetch(
            "https://www.t-imoexo.com/complete_cors_fix.php",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ test: "cors" }),
            }
          );

          const data = await response.json();

          if (response.ok) {
            resultDiv.innerHTML = `
                        <h3 style="color: green;">SUCCESS!</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Message:</strong> ${data.message}</p>
                        <p><strong>Origin:</strong> ${data.origin}</p>
                        <p style="color: green;">CORS is working correctly!</p>
                    `;
          } else {
            resultDiv.innerHTML = `
                        <h3 style="color: red;">FAILED!</h3>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Error:</strong> ${
                          data.error || "Unknown error"
                        }</p>
                        <p style="color: red;">CORS configuration issue detected.</p>
                    `;
          }
        } catch (error) {
          resultDiv.innerHTML = `
                    <h3 style="color: red;">ERROR!</h3>
                    <p><strong>Message:</strong> ${error.message}</p>
                    <p style="color: red;">Network error - CORS headers likely missing.</p>
                `;
          console.error("CORS Test Error:", error);
        }
      }
    </script>
  </body>
</html>
